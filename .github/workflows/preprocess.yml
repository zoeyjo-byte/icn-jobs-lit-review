name: preprocess

on:
  workflow_dispatch:
  push:
    paths:
      - 'sources/**'

permissions:
  contents: write

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests pdfplumber Pillow

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Ensure authenticated remote
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Preprocess sources
        run: python3 bin/preprocess.py
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          VISION_MODEL: ${{ secrets.VISION_MODEL }}

      - name: Commit raw outputs
        run: |
          git add raw/
          if git diff --staged --quiet; then
            echo "No new raw files to commit."
          else
            git commit -m "Preprocess: extract text and figures from sources/"
            git push
          fi